# Render Static Site - set Root Directory to: homeCare-frontend
services:
  - type: web
    name: homecare-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://homecare-1-ftut.onrender.com/api
